              <div class="event-title">
                <span class="${badgeFor(entry.event)}">${escapeHtml(entry.event)}</span>
                <span>${escapeHtml(titleBits.filter(Boolean).join(' · '))}</span>
              </div>
              <div class="event-meta">${escapeHtml(entry.ts)} · ${escapeHtml(entry.sessionId)}${payloadPreview ? ' · ' + escapeHtml(payloadPreview) : ''}</div>
            </div>
            <div class="chevron">›</div>
          </summary>
          <div class="body">
            <div class="grid">
              <div class="k">Timestamp</div><div class="v">${escapeHtml(entry.ts)}</div>
              <div class="k">Session</div><div class="v">${escapeHtml(entry.sessionId)}</div>
              <div class="k">Event</div><div class="v">${escapeHtml(entry.event)}</div>
              <div class="k">Payload keys</div><div class="v">${escapeHtml(Object.keys(payload).join(', ') || 'none')}</div>
            </div>
            <div class="section-title">Payload</div>
            <pre>${formatJson(payload)}</pre>
          </div>
        </details>
      `;
    }).join('');
  </script>
</body>
</html>
